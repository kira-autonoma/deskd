rules:
  fan_out:
    # src::app is a container module (19 submodules re-exported) — raised from 10
    threshold: 20
    level: telemetry
  fan_in:
    # src::domain (28) and src::app are central hubs — raised from 27
    threshold: 30
    level: telemetry
  cycles:
    enabled: true
    level: taboo
  isp:
    threshold: 5
    level: personal
  dip:
    enabled: true
    level: personal

# Clean architecture layers — reflects actual module structure as of v0.7.61.
#
#   src/domain/   — pure types, no I/O, no serde
#   src/ports/    — trait definitions (bus, store, executor)
#   src/infra/    — trait impls, I/O, serde DTOs
#   src/app/      — orchestration, use cases, CLI, adapters
#   src/config.rs — workspace/user config parsing (YAML)
#   src/main.rs   — thin entry point, DI wiring

layers:
  - name: domain
    paths:
      - "src/domain"
  - name: ports
    paths:
      - "src/ports"
  - name: infra
    paths:
      - "src/infra"
  - name: app
    paths:
      - "src/app"
      - "src/config"        # YAML parsing + re-exports from app/paths — app-layer concern
      - "src/bin"
  - name: main
    paths:
      - "src/main"
      - "src/lib"

allowed_dependencies:
  domain: []
  ports: [domain]
  infra: [domain, ports]
  app: [domain, ports, infra]
  main: [domain, ports, infra, app]
