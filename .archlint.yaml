rules:
  fan_out:
    threshold: 10
    level: telemetry
  fan_in:
    threshold: 15
    level: telemetry
  cycles:
    enabled: true
    level: taboo
  isp:
    threshold: 5
    level: personal
  dip:
    enabled: true
    level: personal

layers:
  - name: domain
    paths: ["src/domain"]
  - name: ports
    paths: ["src/ports"]
  - name: infra
    paths: ["src/infra", "src/adapters"]
  - name: app
    paths: ["src/worker", "src/schedule", "src/workflow", "src/mcp"]
  - name: main
    paths: ["src/main"]

allowed_dependencies:
  domain: []
  ports: [domain]
  infra: [domain, ports]
  app: [domain, ports, infra]
  main: [domain, ports, infra, app]
